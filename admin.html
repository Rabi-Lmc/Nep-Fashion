<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nep Fashion | Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding: 50px; background: #f4f1ea;">

    <div class="admin-card" style="max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px;">
        <h2>Upload New Clothing</h2>
        <p style="font-size: 14px; color: #888;">Add a new product to the Nep Fashion collection</p>
        <hr><br>
        
        <form id="upload-form">
            <label>Product Name</label>
            <input type="text" id="p-name" placeholder="e.g. Red Silk Saree" required style="width:100%; margin-bottom:15px; padding:10px;">
            
            <label>Price (NPR)</label>
            <input type="number" id="p-price" placeholder="e.g. 15000" required style="width:100%; margin-bottom:15px; padding:10px;">
            
            <label>Category</label>
            <select id="p-cat" style="width:100%; margin-bottom:15px; padding:10px;">
                <option value="Saree">Saree</option>
                <option value="Lehenga">Lehenga</option>
                <option value="Kurti">Kurti</option>
                <option value="Party Wear">Party Wear</option>
            </select>
            
            <label>Product Photo (Upload from Desktop)</label>
            <input type="file" id="p-file" accept="image/*" required style="width:100%; margin-bottom:10px; padding:10px; border: 1px dashed #ccc;">
            
            <div id="preview-box" style="margin-bottom: 20px; display: none; text-align: center;">
                <p style="font-size: 12px; color: #888;">Preview:</p>
                <img id="image-preview" src="#" alt="Preview" style="max-width: 100%; height: 200px; object-fit: cover; border-radius: 5px; border: 1px solid #ddd;">
            </div>
            
            <button type="submit" id="submit-btn" class="btn primary" style="width: 100%; padding: 12px; cursor: pointer; background: #2c2c2c; color: white; border: none;">Post to Shop</button>
        </form>
        
        <br>
        <a href="index.html" style="color: #666; text-decoration: none;">← Back to Home</a>
    </div>

   <script type="module">
    import { db, collection, query, orderBy, onSnapshot, uploadProductWithImage } from "./auth.js";

    const adminForm = document.getElementById('upload-form');
    const imageInput = document.getElementById('p-file');
    const imagePreview = document.getElementById('image-preview');
    const previewBox = document.getElementById('preview-box');

    // 1. Image Preview
    imageInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                if (previewBox) previewBox.style.display = 'block';
                imagePreview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    });

    // 2. Form Submission
    adminForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const imageFile = imageInput.files[0];
        const submitBtn = document.getElementById('submit-btn');

        submitBtn.innerText = "Uploading...";
        submitBtn.disabled = true;

        try {
            const productData = {
                name: document.getElementById('p-name').value,
                price: Number(document.getElementById('p-price').value),
                category: document.getElementById('p-cat').value
            };

            const success = await uploadProductWithImage(imageFile, productData);
            if (success) {
                adminForm.reset();
                if (previewBox) previewBox.style.display = 'none';
                alert("Success! Product is live.");
            }
        } catch (error) {
            alert("Error uploading product.");
        } finally {
            submitBtn.innerText = "Post to Shop";
            submitBtn.disabled = false;
        }
    });
</script>
</body>
</html>
